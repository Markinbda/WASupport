[build]
  base = "."
  command = "pnpm install --frozen-lockfile=false && pnpm --filter @academydesk/web build"
  publish = "apps/web/dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "22"
  PNPM_VERSION = "9"
  NPM_FLAGS = "--version"   # prevent npm install; we use pnpm
  AWS_LAMBDA_JS_RUNTIME = "nodejs22.x"

[functions]
  node_bundler = "esbuild"
  directory = "netlify/functions"

# Sweep open tickets for SLA reminders (approaching/overdue). Runs every 15 min.
[functions."sla-reminders"]
  schedule = "*/15 * * * *"

# Friendly URLs for functions (must come BEFORE the SPA fallback)
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# SPA fallback so React Router works
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[dev]
  command = "pnpm --filter @academydesk/web dev"
  targetPort = 5173
  port = 8888
  framework = "#custom"
  publish = "apps/web/dist"
